<!DOCTYPE html>
<html>
<head>
  <title>For My Love ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      overflow: hidden;
    }

    .login, .content {
      margin-top: 80px;
    }

    input, button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #ff4d6d;
      color: white;
      cursor: pointer;
    }

    .content { display: none; }

    /* Slideshow */
    .slideshow {
      width: 280px;
      height: 280px;
      margin: 20px auto;
      border-radius: 20px;
      overflow: hidden;
    }

    .slide {
      width: 100%;
      height: 100%;
      display: none;
      object-fit: cover;
    }

    /* Typing */
    #typing {
      font-size: 20px;
      width: 80%;
      margin: auto;
      min-height: 60px;
    }

    /* Hearts */
    .heart {
      position: absolute;
      font-size: 20px;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }
  </style>
</head>

<body onclick="burstHearts(event)">

<!-- LOGIN -->
<div class="login">
  <h2>🔐 Only for You ❤️</h2>
  <input type="password" id="password" placeholder="Our secret 😉">
  <br><br>
  <button onclick="checkPassword()">Unlock</button>
</div>

<!-- CONTENT -->
<div class="content" id="content">
  <h1> I promise to stand by you in your worst days, laugh with you in your best days, and love you in every phase of life. You are my today and all my tomorrows❤️</h1>

  <!-- Slideshow -->
  <div class="slideshow">
    <img src="photo1.jpeg" class="slide">
    <img src="photo2.jpeg" class="slide">
    <img src="photo3.jpeg" class="slide">
  </div>

  <p id="typing"></p>

  <h2>Forever Yours 💍</h2>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mpeg" type="audio/mpeg">
</audio>

<script>
  function checkPassword() {
    if(document.getElementById("password").value === "sivanandi") {
      document.querySelector(".login").style.display = "none";
      document.getElementById("content").style.display = "block";
      document.getElementById("music").play();

      startSlideshow();
      startTyping();
      floatingHearts();
    } else {
      alert("Wrong password 😜");
    }
  }

  // Slideshow
  let i = 0;
  function startSlideshow() {
    let slides = document.getElementsByClassName("slide");
    slides[0].style.display = "block";

    setInterval(() => {
      for(let s of slides) s.style.display = "none";
      i = (i + 1) % slides.length;
      slides[i].style.display = "block";
    }, 2000);
  }

  // Typing effect
  let msg = "You are my home, my happiness, my forever ❤️";
  let j = 0;
  function startTyping() {
    function type() {
      if(j < msg.length) {
        document.getElementById("typing").innerHTML += msg[j];
        j++;
        setTimeout(type, 50);
      }
    }
    type();
  }

  // Floating hearts
  function floatingHearts() {
    setInterval(() => {
      let h = document.createElement("div");
      h.className = "heart";
      h.innerHTML = "❤️";
      h.style.left = Math.random()*100 + "vw";
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 5000);
    }, 300);
  }

  // Click burst hearts
  function burstHearts(e) {
    for(let k=0;k<8;k++) {
      let h = document.createElement("div");
      h.className = "heart";
      h.innerHTML = "💖";
      h.style.left = e.clientX + "px";
      h.style.top = e.clientY + "px";
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1000);
    }
  }
</script>

</body>
</html>
